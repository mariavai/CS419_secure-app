<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure File Storage System</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="nav-header">
        <strong>Dashboard</strong>
        <button class="btn" style="width: auto; background: var(--text-muted);" onclick="logout()">Logout</button>
        <button class="btn" style="width: auto;" onclick="openPasswordModal()">Change Password</button>
    </header>

    <main class="dashboard-container">
        <div id="admin-tabs" class="tabs hidden">
            <button class="tab-btn active" onclick="switchTab('files')">Manage Files</button>
            <button class="tab-btn" onclick="switchTab('users')">Manage Users</button>
        </div>

        <section id="view-files">
            <div class="toolbar">
                <button class="btn" onclick="document.getElementById('file-upload').click()">Upload File</button>
                <input type="file" id="file-upload" class="hidden" onchange="uploadFile(event)">
                <button id="btn-download" class="btn" disabled onclick="downloadSelected()">Download Selected</button>
            </div>

            <div class="file-list">
                <div class="file-header">
                    <span>File Name</span>
                    <span>Owner</span>
                    <span>Date</span>
                    <span>Actions</span>
                </div>
                <div id="file-container"></div>
            </div>
        </section>

        <section id="view-users" class="hidden">
            <div class="file-list">
                <div class="file-header">
                    <span>Username</span>
                    <span>Role</span>
                    <span>Status</span>
                </div>
                <div id="user-container"></div>
            </div>
        </section>
    </main>

    <script src="/static/js/dashboard.js"></script>
    <div id="toast-container"></div>
    <div id="password-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Change Password</h3>

        <label>Current Password</label>
        <input type="password" id="old-password">

        <label>New Password</label>
        <input type="password" id="new-password">

        <label>Confirm New Password</label>
        <input type="password" id="confirm-password">

        <div class="modal-actions">
            <button class="btn" onclick="submitPasswordChange()">Update Password</button>
            <button class="btn danger-btn" onclick="closePasswordModal()">Cancel</button>
        </div>
    </div>
</div>
<div id="audit-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Document History</h3>

        <div id="audit-info">
            <!-- Filled dynamically by dashboard.js -->
        </div>

        <div class="modal-actions">
            <button class="btn danger-btn" onclick="closeAuditModal()">Close</button>
        </div>
    </div>
</div>

    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Storage System</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="toast-container"></div>

    <div class="auth-wrapper">
        <div class="auth-box">
            
            <div id="login-view">
                <h2>Sign In</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="login-user" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-pass" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
                <div class="toggle-text" onclick="toggleView()">Don't already have an account? Register here!</div>
            </div>

            <div id="register-view" class="hidden">
                <h2>Create Account</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="reg-user" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-pass" required autocomplete="new-password">
                        <span class="input-hint">Must be at least 12 characters, include at least one uppercase letter, lowercase letter, number and special character.</span>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="reg-pass-confirm" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn">Register</button>
                </form>
                <div class="toggle-text" onclick="toggleView()">Back to Login</div>
            </div>

        </div>
    </div>
    
    <script src="/static/js/login.js"></script>
</body>
</html>
